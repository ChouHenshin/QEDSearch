<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QEDSearch</title>
<style>
  :root {
    --bg: #0f1115; --panel: #161a22; --panel-2: #1d222c;
    --border: #262c38; --text: #e6e8ec; --muted: #9aa3b2;
    --accent: #7aa2f7; --hit: #f7c97a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--text); line-height: 1.5; }
  header { padding: 1.5rem 2rem 1rem; border-bottom: 1px solid var(--border); }
  header h1 { margin: 0 0 0.25rem; font-size: 1.25rem; }
  header p { margin: 0; color: var(--muted); font-size: 0.875rem; }
  main { max-width: 900px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }
  .controls { display: grid; gap: 0.75rem; margin-bottom: 1.5rem; }
  @media (min-width: 600px) { .controls { grid-template-columns: 2fr 1fr 1fr; } }
  input, select { background: var(--panel); color: var(--text); border: 1px solid var(--border);
                  border-radius: 8px; padding: 0.6rem 0.75rem; font-size: 0.95rem; font-family: inherit; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .status { color: var(--muted); font-size: 0.875rem; margin-bottom: 1rem; min-height: 1.25rem; }
  .results { display: flex; flex-direction: column; gap: 0.5rem; }
  .result { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
            padding: 0.875rem 1rem; text-decoration: none; color: inherit; }
  .result:hover { background: var(--panel-2); border-color: var(--accent); }
  .meta { display: flex; gap: 0.75rem; font-size: 0.8rem; color: var(--muted);
          margin-bottom: 0.375rem; flex-wrap: wrap; }
  .badge { background: #3a4a6e; color: var(--text); padding: 0.1rem 0.5rem; border-radius: 3px; }
  .snippet { font-size: 0.9rem; font-family: ui-monospace, Menlo, monospace;
             word-break: break-word; white-space: pre-wrap; }
  mark { background: transparent; color: var(--hit); font-weight: 600; }
</style>
</head>
<body>
<header>
  <h1>QEDSearch</h1>
  <p>Search across Engineering Tripos' past paper questions.</p>
</header>
<main>
  <div class="controls">
    <input id="q" type="search" placeholder="Search query" autofocus autocomplete="off">
    <select id="part">
      <option value="">All Tripos Parts</option>
      <option value="IA">IA</option>
      <option value="IB">IB</option>
    </select>
    <select id="module"><option value="">All modules</option></select>
  </div>
  <div id="status" class="status">Loading index…</div>
  <div id="results" class="results"></div>
</main>

<script type="module">
import MiniSearch from 'https://cdn.jsdelivr.net/npm/minisearch@7.2.0/+esm';

const pdfBase = part => `https://cribs-static.pages.dev/${part}/tripos`;
const SNIPPET_RADIUS = 80;

const $ = id => document.getElementById(id);
const qEl = $('q'), partEl = $('part'), moduleEl = $('module');
const statusEl = $('status'), resultsEl = $('results');

let mini, allDocs;

(async () => {
  const t0 = performance.now();
  const [indexRes, metaRes] = await Promise.all([
    fetch('search-index.json'),
    fetch('docs-meta.json'),
  ]);
  const data = await indexRes.json();
  allDocs = await metaRes.json();
  mini = MiniSearch.loadJS(data, {
    fields: ['text'],
    storeFields: ['part', 'module', 'paper', 'page', 'text'],
    searchOptions: { fuzzy: 0.1, prefix: true },
  });
  populateFilters();
  statusEl.textContent = `Ready. ${mini.documentCount} pages indexed (${((performance.now() - t0) / 1000).toFixed(2)}s).`;
})();

function populateFilters() {
  const modules = [...new Set(allDocs.map(d => d.module))].sort();
  for (const m of modules) moduleEl.append(new Option(m, m));
}

partEl.addEventListener('change', () => {
  const part = partEl.value;
  moduleEl.innerHTML = '<option value="">All modules</option>';
  const modules = [...new Set(
    allDocs.filter(d => !part || d.part === part).map(d => d.module)
  )].sort();
  for (const m of modules) moduleEl.append(new Option(m, m));
  search();
});
moduleEl.addEventListener('change', search);
qEl.addEventListener('input', debounce(search, 200));

function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

function search() {
  const q = qEl.value.trim();
  if (!q) { resultsEl.innerHTML = ''; statusEl.textContent = ''; return; }

  const filter = doc =>
    (!partEl.value || doc.part === partEl.value) &&
    (!moduleEl.value || doc.module === moduleEl.value);

  const hits = mini.search(q, { filter, combineWith: 'AND' });
  hits.sort((a, b) => {
    const ya = parseInt(a.paper.match(/\d{4}/)?.[0] || 0);
    const yb = parseInt(b.paper.match(/\d{4}/)?.[0] || 0);
    return yb - ya;
  });
  render(hits.slice(0, 100), q);
  statusEl.textContent = `${hits.length} matches${hits.length > 100 ? ' (showing 100)' : ''}`;
}

function render(hits, query) {
  if (!hits.length) {
    resultsEl.innerHTML = '<div class="status">No matches.</div>';
    return;
  }
  resultsEl.innerHTML = hits.map(h => {
    const url = `${pdfBase(h.part)}/${h.module}/${h.paper}.pdf#page=${h.page}`;
    const snippet = makeSnippet(h.text, h.terms);
    return `<a class="result" href="${url}" target="_blank" rel="noopener">
      <div class="meta">
        <span class="badge">${h.module}</span>
        <span>${h.paper}</span>
        <span>page ${h.page}</span>
      </div>
      <div class="snippet">${snippet}</div>
    </a>`;
  }).join('');
}

function makeSnippet(text, terms) {
  if (!text) return '';
  const lower = text.toLowerCase();
  let pos = -1;
  for (const term of terms) {
    const i = lower.indexOf(term.toLowerCase());
    if (i !== -1 && (pos === -1 || i < pos)) pos = i;
  }
  if (pos === -1) pos = 0;

  const start = Math.max(0, pos - SNIPPET_RADIUS);
  const end = Math.min(text.length, pos + SNIPPET_RADIUS);
  let snippet = text.slice(start, end);
  if (start > 0) snippet = '…' + snippet;
  if (end < text.length) snippet = snippet + '…';

  snippet = escapeHtml(snippet);
  for (const term of terms) {
    const re = new RegExp(`(${escapeRegex(term)})`, 'gi');
    snippet = snippet.replace(re, '<mark>$1</mark>');
  }
  return snippet;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
</script>
</body>
</html>
